name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [types, core, auth, ui, ai, db, theme, collab]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @mongrov/${{ matrix.package }} run typecheck

      - name: Test
        run: pnpm --filter @mongrov/${{ matrix.package }} run test

      - name: Build
        run: pnpm --filter @mongrov/${{ matrix.package }} run build
