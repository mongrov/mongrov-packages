name: Publish to npm

on:
  push:
    tags:
      - '@mongrov/*@*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Determine package from tag
        id: pkg
        run: |
          TAG=${GITHUB_REF#refs/tags/@mongrov/}
          PKG=$(echo "$TAG" | sed 's/@.*//')
          VERSION=$(echo "$TAG" | sed 's/.*@//')
          echo "package=$PKG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Verify version matches package.json
        run: |
          PKG_VERSION=$(node -p "require('./packages/${{ steps.pkg.outputs.package }}/package.json').version")
          if [ "${{ steps.pkg.outputs.version }}" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ${{ steps.pkg.outputs.version }} does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Typecheck
        run: pnpm --filter @mongrov/${{ steps.pkg.outputs.package }} run typecheck

      - name: Test
        run: pnpm --filter @mongrov/${{ steps.pkg.outputs.package }} run test

      - name: Build
        run: pnpm --filter @mongrov/${{ steps.pkg.outputs.package }} run build

      - name: Publish
        run: pnpm --filter @mongrov/${{ steps.pkg.outputs.package }} publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
